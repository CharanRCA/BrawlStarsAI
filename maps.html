<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Map Picker – Brawl AI</title>
  <link rel="icon" href="brawlers/spike_portrait.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" style="display:none;"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">⚔️</div>
      <div><h1>Brawl AI</h1><p>Tutor &amp; Analyzer</p></div>
      <button id="sidebarClose" style="margin-left:auto;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <nav>
      <a href="index.html" class="nav-item"><span class="nav-icon">⚡</span>Home</a>
      <a href="draft.html" class="nav-item"><span class="nav-icon">⚔️</span>Draft Analyzer</a>
      <a href="maps.html" class="nav-item active"><span class="nav-icon">🗺️</span>Map Picker</a>
      <a href="chat.html" class="nav-item"><span class="nav-icon">💬</span>AI Chat</a>
    </nav>
  </aside>

  <div class="main">
    <header class="mobile-header">
      <button class="menu-btn" id="menuBtn">☰</button>
      <span style="font-weight:800;font-size:1rem;">Map Picker</span>
    </header>

    <div class="content">
      <div style="margin-bottom:28px;">
        <h2 class="page-title" style="margin-bottom:6px;">Map Brawler Picker</h2>
        <p style="color:rgba(255,255,255,.35);font-size:.88rem;">Select a map to see the best brawlers for that layout and mode.</p>
      </div>

      <!-- Filters -->
      <div class="glass tag-card" style="padding:20px 24px;margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <div style="width:30px;height:30px;border-radius:8px;background:rgba(79,142,247,.15);display:flex;align-items:center;justify-content:center;font-size:.85rem;">🔍</div>
          <span style="font-weight:800;font-size:.9rem;">Filter Maps</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <select id="modeFilter" class="input">
            <option value="all">All Modes</option>
            <option value="Gem Grab">💎 Gem Grab</option>
            <option value="Brawl Ball">⚽ Brawl Ball</option>
            <option value="Bounty">⭐ Bounty</option>
            <option value="Heist">💣 Heist</option>
            <option value="Hot Zone">🔥 Hot Zone</option>
            <option value="Knockout">💀 Knockout</option>
          </select>
          <select id="typeFilter" class="input">
            <option value="all">All Map Types</option>
            <option value="open">🌅 Open Maps</option>
            <option value="closed">🏚️ Closed Maps</option>
            <option value="mixed">🔀 Mixed</option>
          </select>
        </div>
      </div>

      <!-- Map grid -->
      <div id="mapGrid" class="map-grid" style="margin-bottom:32px;"></div>

      <!-- Recommendations -->
      <div id="recommendations" style="display:none;"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
initSidebar();

const modeFilter = document.getElementById('modeFilter');
const typeFilter = document.getElementById('typeFilter');
const mapGrid = document.getElementById('mapGrid');
const recsEl = document.getElementById('recommendations');

let selectedMap = null;

const MAP_GRADIENTS = {
  'Double Swoosh':'#2563eb,#0891b2','Gem Fort':'#d97706,#ca8a04','Hard Rock Mine':'#78716c,#b45309',
  'Undermine':'#059669,#0d9488','Bridge Too Far':'#b91c1c,#c2410c','Hot Potato':'#ea580c,#dc2626',
  'Kaboom Canyon':'#a16207,#c2410c','Safe Zone':'#15803d,#059669','Dry Season':'#b45309,#ca8a04',
  'Hideout':'#7c3aed,#4f46e5','Layer Cake':'#db2777,#e11d48','Shooting Star':'#0891b2,#2563eb',
  'Center Stage':'#7c3aed,#a21caf','Pinball Dreams':'#a21caf,#db2777','Sneaky Fields':'#65a30d,#16a34a',
  'Triple Dribble':'#0284c7,#2563eb','Dueling Beetles':'#0f766e,#0891b2','Open Business':'#4338ca,#1d4ed8',
  'Parallel Plays':'#dc2626,#e11d48','Ring of Fire':'#991b1b,#c2410c',"Belle's Rock":'#b45309,#c2410c',
  'Flaring Phoenix':'#c2410c,#b91c1c','Flowing Springs':'#0e7490,#0f766e','Goldarm Gulch':'#a16207,#b45309',
  'New Horizons':'#1d4ed8,#4338ca','Out in the Open':'#0369a1,#0891b2',
};

function renderMaps() {
  const mode = modeFilter.value;
  const type = typeFilter.value;
  const filtered = MAPS.filter(m =>
    (mode === 'all' || m.mode === mode) &&
    (type === 'all' || m.type === type)
  );

  mapGrid.innerHTML = filtered.map(m => {
    const grad = MAP_GRADIENTS[m.name] || '#3b82f6,#a855f7';
    const emoji = MAP_EMOJIS[m.mode] || '🗺️';
    const isSelected = selectedMap === m.name;
    return `<div class="map-card ${isSelected ? 'selected' : ''}" data-name="${m.name}">
      <div class="map-thumb" style="background:linear-gradient(135deg,${grad});">${emoji}</div>
      <div class="map-info">
        <h4>${m.name}</h4>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:.72rem;color:rgba(255,255,255,.4);">${m.mode}</span>
          <span class="badge badge-gray" style="font-size:.65rem;">${m.type}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  mapGrid.querySelectorAll('.map-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedMap = card.dataset.name;
      renderMaps();
      renderRecommendations();
    });
  });
}

// Mode + layout aware recommendations
const MODE_PICKS = {
  'Gem Grab':   { good: ['Poco','Gene','Pam','Sandy','Gus','Byron','Bo','Tick','Emz','Sprout'],   avoid: ['El Primo','Bull','Frank','Darryl','Edgar'] },
  'Brawl Ball': { good: ['El Primo','Bull','Frank','Rosa','Bibi','Jacky','Brock','Rico','Mortis','Gale'], avoid: ['Piper','Bea','Belle','Nani','Mandy'] },
  'Heist':      { good: ['Brock','Dynamike','Griff','Colt','Rico','Piper','Belle','Lola','Tick','Grom'],  avoid: ['Frank','Jacky','Rosa','Poco','Sandy'] },
  'Bounty':     { good: ['Piper','Belle','Brock','Colt','Bea','Nani','Mandy','Bo','Emz','Barley'],        avoid: ['El Primo','Bull','Frank','Darryl','Rosa'] },
  'Hot Zone':   { good: ['Emz','Sandy','Poco','Pam','Gale','Byron','Buster','Leon','Surge','Tara'],       avoid: ['Brock','Dynamike','Tick','Barley','Piper'] },
  'Knockout':   { good: ['Brock','Colt','Piper','Belle','Maisie','Bea','Nani','Leon','Crow','Angelo'],    avoid: ['Poco','Pam','Byron','Gus','El Primo'] },
  'Showdown':   { good: ['Leon','Crow','Mortis','Surge','Chester','Shelly','Bull','Spike','Brock','Colt'], avoid: ['Poco','Gus','Ruffs','Maisie','Gale'] },
  'Duels':      { good: ['Mortis','Leon','Edgar','Crow','Fang','Melodie','Chester','Kenji','Surge','Stu'], avoid: ['Poco','Pam','Sandy','Bo','Tick'] },
};

const TYPE_MODIFIER = {
  open:   { boost: ['long'], penalty: ['short'] },
  closed: { boost: ['short'], penalty: ['long'] },
  mixed:  { boost: ['medium'], penalty: [] },
};

function getBrawlersByMap(mode, type) {
  const base = (MODE_PICKS[mode] || MODE_PICKS['Bounty']).good;
  const mod = TYPE_MODIFIER[type] || TYPE_MODIFIER.mixed;
  // Sort: brawlers whose range matches the layout come first
  return [...base].sort((a, b) => {
    const ra = BRAWLER_RANGES[a] || 'medium';
    const rb = BRAWLER_RANGES[b] || 'medium';
    const sa = mod.boost.includes(ra) ? -1 : mod.penalty.includes(ra) ? 1 : 0;
    const sb = mod.boost.includes(rb) ? -1 : mod.penalty.includes(rb) ? 1 : 0;
    return sa - sb;
  }).slice(0, 6);
}

function getAvoidByMap(mode, type) {
  const base = (MODE_PICKS[mode] || MODE_PICKS['Bounty']).avoid;
  const mod = TYPE_MODIFIER[type] || TYPE_MODIFIER.mixed;
  return [...base].sort((a, b) => {
    const ra = BRAWLER_RANGES[a] || 'medium';
    const rb = BRAWLER_RANGES[b] || 'medium';
    const sa = mod.penalty.includes(ra) ? -1 : 0;
    const sb = mod.penalty.includes(rb) ? -1 : 0;
    return sa - sb;
  }).slice(0, 4);
}

function brawlerImgEl(name, size) {
  const img = getBrawlerImageUrl(name);
  const color = BRAWLER_COLORS[name] || '#3b82f6';
  const init = getBrawlerInitials(name);
  if (img) {
    return `<img src="${img}" alt="${name}" style="width:${size}px;height:${size}px;border-radius:10px;object-fit:cover;margin:0 auto;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div style="display:none;width:${size}px;height:${size}px;border-radius:10px;background:${color}20;color:${color};font-weight:900;font-size:${size*.32}px;align-items:center;justify-content:center;margin:0 auto;">${init}</div>`;
  }
  return `<div style="display:flex;width:${size}px;height:${size}px;border-radius:10px;background:${color}20;color:${color};font-weight:900;font-size:${size*.32}px;align-items:center;justify-content:center;margin:0 auto;">${init}</div>`;
}

function renderRecommendations() {
  if (!selectedMap) { recsEl.style.display = 'none'; return; }
  const mapData = MAPS.find(m => m.name === selectedMap);
  if (!mapData) return;

  const good = getBrawlersByMap(mapData.mode, mapData.type);
  const bad  = getAvoidByMap(mapData.mode, mapData.type);

  recsEl.style.display = 'block';
  recsEl.innerHTML = `
    <div class="glass" style="padding:24px;margin-bottom:14px;border-color:rgba(52,211,153,.18);position:relative;overflow:hidden;">
      <div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(52,211,153,.06);border-radius:50%;filter:blur(40px);pointer-events:none;"></div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div style="width:40px;height:40px;border-radius:12px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.25);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">✅</div>
        <div>
          <h3 style="font-size:1rem;font-weight:900;">Best Picks — ${selectedMap}</h3>
          <p style="font-size:.76rem;color:rgba(255,255,255,.4);margin-top:2px;">${MAP_EMOJIS[mapData.mode]||''} ${mapData.mode} &nbsp;·&nbsp; ${mapData.type} layout</p>
        </div>
      </div>
      <div class="brawler-rec-grid">
        ${good.map(name => `
          <div class="brawler-rec-card">
            ${brawlerImgEl(name, 56)}
            <h4 style="font-size:.8rem;font-weight:800;margin:6px 0 2px;">${name}</h4>
            <p style="font-size:.68rem;color:rgba(255,255,255,.35);">${BRAWLER_ROLES[name]||''}</p>
            <span class="badge badge-green" style="font-size:.6rem;margin-top:4px;">${BRAWLER_RANGES[name]||''}</span>
          </div>
        `).join('')}
      </div>
    </div>

    ${bad.length > 0 ? `
    <div class="glass" style="padding:22px;border-color:rgba(248,113,113,.18);position:relative;overflow:hidden;">
      <div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(248,113,113,.06);border-radius:50%;filter:blur(40px);pointer-events:none;"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;">⚠️</div>
        <h3 style="font-size:.95rem;font-weight:900;">Avoid on This Map</h3>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${bad.map(name => `
          <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:10px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.18);">
            ${brawlerImgEl(name, 26)}
            <div><div style="font-size:.82rem;font-weight:700;">${name}</div><div style="font-size:.65rem;color:rgba(255,255,255,.35);">${BRAWLER_ROLES[name]||''}</div></div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
  `;
  recsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

modeFilter.addEventListener('change', () => { selectedMap = null; renderMaps(); recsEl.style.display = 'none'; });
typeFilter.addEventListener('change', () => { selectedMap = null; renderMaps(); recsEl.style.display = 'none'; });

renderMaps();
</script>
</body>
</html>
